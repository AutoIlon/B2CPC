name: Build and Release Windows EXE

on:
  push:
    tags:
      - 'v*.*.*' # v1.0.0 같은 태그를 푸시할 때만 실행됩니다.

permissions:
  contents: write

jobs:
  build_and_release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Extract Tag Name (Remove 'v')
        id: extract_tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          TAG_NAME=${TAG_NAME#v}
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
        shell: bash

      - name: Build EXE Package
        run: ./gradlew packageExe -PappVersion=${{ env.TAG_NAME }}
        shell: bash

      - name: Find EXE File
        id: find_exe
        run: |
          EXE_PATH=$(find build/compose/binaries -name "*.exe" | head -n 1)
          echo "EXE_PATH=$EXE_PATH" >> $GITHUB_ENV
        shell: bash

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.EXE_PATH }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
