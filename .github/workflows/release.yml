name: Build and Release Windows MSI

on:
  push:
    tags:
      - 'v*.*.*' # v1.0.0 같은 태그를 푸시할 때만 실행됩니다.

jobs:
  build_and_release:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Download WiX Toolset
        run: |
          $wixUrl = "https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip"
          $wixZip = "$env:RUNNER_TEMP\wix.zip"
          $wixExtracted = "C:\wix"
          Invoke-WebRequest -Uri $wixUrl -OutFile $wixZip
          Expand-Archive -Path $wixZip -DestinationPath $wixExtracted
          echo "$wixExtracted" >> $env:GITHUB_PATH

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew
        shell: bash

      - name: Extract Tag Name
        id: extract_tag
        run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
        shell: bash

      - name: Build MSI Package
        run: ./gradlew packageMsi -PappVersion=${{ env.TAG_NAME }} # 태그 버전을 앱 버전으로 전달

      - name: Find MSI File
        id: find_msi
        run: |
          $msiPath = Get-ChildItem -Path build\compose\binaries\main\msi -Filter *.msi | Select-Object -First 1 -ExpandProperty FullName
          echo "MSI_PATH=$msiPath" >> $env:GITHUB_ENV

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.MSI_PATH }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
